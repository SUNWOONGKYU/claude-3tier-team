  <text x="1035" y="362" font-size="15" font-weight="700" fill="#c2255c" text-anchor="middle">Fable 5 · API 호출</text>
  <text x="1035" y="390" font-size="12.5" fill="#7f4a5e" text-anchor="middle">기획·전략 판단 필요시에만</text>
  <text x="1035" y="412" font-size="12.5" fill="#7f4a5e" text-anchor="middle">상주 없음 · 건당 과금</text>
  <line x1="874" y1="372" x2="916" y2="372" stroke="#c2255c" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrPink)" marker-start="url(#arrPinkStart)"/>
  <text x="895" y="359" font-size="12.5" font-weight="600" fill="#c2255c" text-anchor="middle">자문</text>

  <!-- ② 소대장 → 분대장 (분기) -->
  <line x1="600" y1="452" x2="600" y2="478" stroke="#2563eb" stroke-width="2.2"/>
  <line x1="600" y1="478" x2="332" y2="507" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrBlue)"/>
  <line x1="600" y1="478" x2="868" y2="507" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrBlue)"/>
  <text x="614" y="473" font-size="14" font-weight="600" fill="#1d4ed8">② 소환 + 모델 배정</text>

