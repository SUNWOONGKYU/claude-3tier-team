  <text x="242" y="550" font-size="18" font-weight="700" fill="#111827">분대장 A — 팀메이트</text>
  <text x="162" y="587" font-size="15" font-weight="700" fill="#15803d">Sonnet 5 · 구독</text>
  <text x="162" y="615" font-size="13.5" fill="#374151">담당 구역 작업 · 분대원 소환 권한 보유</text>
  <text x="162" y="641" font-size="12.5" fill="#6b7280">분대원 소환 시 임무명세서 필수 (컨텍스트 격리)</text>

  <!-- 2계층: 분대장 B -->
  <rect x="680" y="512" width="380" height="150" rx="14" fill="#ebf8f0" stroke="#16a34a" stroke-width="2.5"/>
  <rect x="702" y="530" width="66" height="27" rx="13.5" fill="#16a34a"/>
  <text x="735" y="549" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">2계층</text>
