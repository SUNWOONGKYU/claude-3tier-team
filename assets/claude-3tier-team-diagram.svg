  <text x="600" y="590" font-size="12.5" font-weight="600" fill="#15803d" text-anchor="middle">메일박스 교신</text>
  <text x="600" y="623" font-size="12.5" font-weight="600" fill="#15803d" text-anchor="middle">공유 작업목록</text>

  <!-- ③ 분대장 → 분대원 -->
  <line x1="330" y1="662" x2="244" y2="716" stroke="#16a34a" stroke-width="2" marker-end="url(#arrGreen)"/>
  <line x1="330" y1="662" x2="592" y2="716" stroke="#16a34a" stroke-width="2" marker-end="url(#arrGreen)"/>
  <line x1="870" y1="662" x2="956" y2="716" stroke="#16a34a" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="140" y="698" font-size="13.5" font-weight="600" fill="#15803d">③ 소환 + 모델 배정 (필요시)</text>
  <text x="985" y="684" font-size="13.5" font-weight="600" fill="#15803d">③ 소환 + 모델 배정</text>
  <text x="985" y="704" font-size="13.5" font-weight="600" fill="#15803d">(필요시)</text>

  <!-- 3계층: 분대원 3개 -->
  <rect x="90" y="722" width="300" height="120" rx="12" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.8"/>
  <rect x="110" y="738" width="66" height="25" rx="12.5" fill="#6b7280"/>
  <text x="143" y="756" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">3계층</text>
  <text x="188" y="757" font-size="16.5" font-weight="700" fill="#111827">분대원 ①</text>
  <text x="110" y="792" font-size="14.5" font-weight="700" fill="#374151">Haiku 4.5 · 구독</text>
  <text x="110" y="820" font-size="12.5" fill="#6b7280">단일 임무 → 결과 보고 → 소멸</text>

  <rect x="450" y="722" width="300" height="120" rx="12" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.8"/>
  <text x="470" y="757" font-size="16.5" font-weight="700" fill="#111827">분대원 ②</text>
  <text x="470" y="792" font-size="14.5" font-weight="700" fill="#374151">Haiku 4.5 · 구독</text>
  <text x="470" y="820" font-size="12.5" fill="#6b7280">단일 임무 → 결과 보고 → 소멸</text>

  <rect x="810" y="722" width="300" height="120" rx="12" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.8"/>
  <text x="830" y="757" font-size="16.5" font-weight="700" fill="#111827">분대원 ③</text>
  <text x="830" y="792" font-size="14.5" font-weight="700" fill="#374151">필요시 Sonnet 5 · 구독</text>
  <text x="830" y="820" font-size="12.5" fill="#6b7280">단일 임무 → 결과 보고 → 소멸</text>

  <!-- ④ 산출물 → 검증 -->
  <line x1="600" y1="842" x2="600" y2="906" stroke="#b45309" stroke-width="2.2" marker-end="url(#arrGold)"/>
  <text x="614" y="882" font-size="14" font-weight="600" fill="#92400e">④ 산출물 제출</text>

  <!-- 검증 게이트 -->
  <rect x="140" y="912" width="920" height="172" rx="14" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <text x="166" y="946" font-size="16.5" font-weight="700" fill="#92400e">검증 게이트 — 읽기 전용 (Edit·Write 금지, 발견·보고만)</text>

  <rect x="166" y="964" width="380" height="100" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="1.8"/>
  <text x="188" y="996" font-size="16.5" font-weight="700" fill="#111827">V① 1차 검증 · Sonnet 5 · 구독</text>
  <text x="188" y="1024" font-size="13" fill="#78350f">형식·기준 충족·명백한 오류 전수 필터</text>
  <text x="188" y="1048" font-size="12.5" fill="#92400e">통과분만 V②로 인계</text>

  <line x1="546" y1="1014" x2="608" y2="1014" stroke="#b45309" stroke-width="2.2" marker-end="url(#arrGold)"/>

  <rect x="614" y="964" width="400" height="100" rx="10" fill="#ffedd5" stroke="#ea580c" stroke-width="1.8"/>
  <text x="636" y="996" font-size="16.5" font-weight="700" fill="#111827">V② 최종 게이트 · Opus 4.8 · 구독</text>
  <text x="636" y="1024" font-size="13" fill="#7c2d12">판단 품질 검증 · 통과/반려 결정</text>
  <text x="636" y="1048" font-size="12.5" fill="#9a3412">반려 시 해당 분대장 수정 → 재검증</text>

  <!-- 반려 순환 루프: 검증 게이트 외곽 박스 ↔ 분대장 B (양방향) -->
  <path d="M 1060,996 C 1152,996 1152,587 1064,587" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrRed)" marker-start="url(#arrRedStart)"/>
  <text transform="rotate(-90 1160 792)" x="1160" y="792" font-size="12.5" font-weight="600" fill="#dc2626" text-anchor="middle">반려 ↔ 수정 ↔ 재검증 (순환)</text>

  <!-- ⑤ 검증 → 최종 -->
  <line x1="600" y1="1084" x2="600" y2="1128" stroke="#475569" stroke-width="2.2" marker-end="url(#arrGray)"/>
  <text x="614" y="1112" font-size="14" font-weight="600" fill="#334155">⑤ 통과 → 소대장 종합</text>

  <!-- 최종 산출물 -->
  <rect x="360" y="1134" width="480" height="66" rx="12" fill="#eef1f6" stroke="#475569" stroke-width="1.8"/>
  <text x="600" y="1174" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">최종 산출물 — 소대장 종합 보고 · 팀 정리</text>

  <!-- ⑥ 최종 → 지휘관 보고 -->
  <line x1="600" y1="1200" x2="600" y2="1250" stroke="#475569" stroke-width="2.2" marker-end="url(#arrGray)"/>
  <text x="614" y="1232" font-size="14" font-weight="600" fill="#334155">⑥ 지휘관 보고</text>
  <rect x="470" y="1256" width="260" height="54" rx="27" fill="#eef1f6" stroke="#475569" stroke-width="1.8"/>
  <text x="600" y="1289" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">지휘관 — 보고 접수</text>

  <!-- 편제 원칙 -->
  <rect x="0" y="1346" width="1200" height="220" fill="#f5f7fa"/>
  <line x1="0" y1="1346" x2="1200" y2="1346" stroke="#d5dbe4" stroke-width="1.5"/>
  <text x="80" y="1388" font-size="16" font-weight="700" fill="#111827">편제 원칙</text>
  <text x="80" y="1422" font-size="14" fill="#374151">· 모델 배정은 소환자가 결정한다 — 소대장→분대장, 분대장→분대원 (spawn 시 model 매개변수)</text>
  <text x="80" y="1452" font-size="14" fill="#374151">· 팀메이트 중첩 소환 불가 — 분대원은 반드시 서브에이전트로 편성한다</text>
  <text x="80" y="1482" font-size="14" fill="#374151">· 분대원은 컨텍스트 격리 상태로 시작 — 임무명세서에 완결적 정보를 담는다</text>
  <text x="80" y="1512" font-size="14" fill="#374151">· 검증자는 수정 권한이 없다 — 발견·보고만 하고, 수정은 작업자가 한다 (순환 검증)</text>
  <text x="80" y="1542" font-size="14" fill="#374151">· 용병(ChatGPT·Gemini·Grok·Perplexity·GLM)은 소대장 판단으로만 호출 — ① CLI ② 웹세션 자동화(크롬·구독) ③ API/MCP</text>

  <!-- 장점 요약 -->
  <text x="80" y="1614" font-size="16" font-weight="700" fill="#111827">장점 요약</text>
  <text x="80" y="1648" font-size="14" fill="#374151">1. 비용 최적화 내장 — 비싼 모델은 판단 자리에만, 물량은 싼 모델에게. 모델 라우팅이 곧 비용 통제</text>
  <text x="80" y="1678" font-size="14" fill="#374151">2. 지휘관은 임무만 — 작업 분해·모델 선정·소환·배정은 전부 소대장이 수행</text>
  <text x="80" y="1708" font-size="14" fill="#374151">3. 품질 보장 — 작업·검증 분리, V①→V② 이중 게이트, 자기 실수를 자기가 눈감는 사각지대 없음</text>
  <text x="80" y="1738" font-size="14" fill="#374151">4. 병렬 처리 — 분대장들이 각자 컨텍스트 창에서 동시 작업, 메일박스 교신으로 충돌 조정</text>
  <text x="80" y="1768" font-size="14" fill="#374151">5. Claude에 한정되지 않음 — 용병 5 투입 가능, 호출 경로 3갈래로 한 경로가 막혀도 작전 지속</text>

  <!-- 푸터 -->
  <line x1="80" y1="1802" x2="1120" y2="1802" stroke="#d5dbe4" stroke-width="1"/>
  <text x="80" y="1834" font-size="13" fill="#94a3b8">Claude 3계층 작업팀 구성 (claude-3tier-team) · Claude Code Agent Teams + Subagents + Fable 5 API + 용병 CLI/웹세션/API/MCP</text>
</svg>
