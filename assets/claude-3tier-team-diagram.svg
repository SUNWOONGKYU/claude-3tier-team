  <text x="352" y="400" font-size="14.5" fill="#374151">업무 파악 → 작업 분해 → 분대장 소환·모델 배정 → 결과 종합</text>
  <text x="352" y="430" font-size="13" fill="#6b7280">모델은 소환 시점에 고정 · 용병/참모 호출 판단 권한 보유</text>

  <!-- 전략참모 (Fable 5, API) -->
