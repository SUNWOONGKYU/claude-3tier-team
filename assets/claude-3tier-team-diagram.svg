  <text x="702" y="587" font-size="15" font-weight="700" fill="#15803d">Sonnet 5 · 구독</text>
  <text x="702" y="615" font-size="13.5" fill="#374151">담당 구역 작업 · 분대원 소환 권한 보유</text>
  <text x="702" y="641" font-size="12.5" fill="#6b7280">분대원 소환 시 임무명세서 필수 (컨텍스트 격리)</text>

  <!-- 분대장 간 교신 -->
